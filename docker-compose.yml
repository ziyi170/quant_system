version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: quant-postgres
    environment:
      POSTGRES_USER: quant_user
      POSTGRES_PASSWORD: quant_password_secure
      POSTGRES_DB: quant_trading
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - quant_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant_user -d quant_trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Streaming
  redis:
    image: redis:7-alpine
    container_name: quant-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quant_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Message Broker (Optional - for high-volume streaming)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: quant-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    networks:
      - quant_network
    depends_on: []

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: quant-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092,PLAINTEXT_EXTERNAL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - quant_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: quant-backend
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://quant_user:quant_password_secure@postgres:5432/quant_trading
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKER: kafka:29092
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quant_network
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quant-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - quant_network
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev

  # Jupyter Notebook Server (Optional - for research)
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: quant-jupyter
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://quant_user:quant_password_secure@postgres:5432/quant_trading
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
    networks:
      - quant_network
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root

  # Monitoring Dashboard (Prometheus + Grafana)
  prometheus:
    image: prom/prometheus:latest
    container_name: quant-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - quant_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: quant-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - quant_network
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  quant_network:
    driver: bridge
